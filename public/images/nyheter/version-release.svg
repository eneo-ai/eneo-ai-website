<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Illustration: en grön uppåtpekande pil – symbol för en ny version av Eneo.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d7f5e6"/>
      <stop offset="100%" stop-color="#c8ecf5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Soft circular accent -->
  <circle cx="600" cy="315" r="220" fill="#ffffff" opacity="0.45"/>

  <!-- Up arrow (centered) -->
  <g stroke="#16a34a" stroke-width="44" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <line x1="600" y1="440" x2="600" y2="210"/>
    <polyline points="495,315 600,210 705,315"/>
  </g>

  <!-- Subtle accent dots -->
  <g fill="#16a34a" opacity="0.45">
    <circle cx="250" cy="180" r="6"/>
    <circle cx="950" cy="470" r="6"/>
    <circle cx="180" cy="460" r="4"/>
    <circle cx="1020" cy="200" r="4"/>
  </g>
</svg>

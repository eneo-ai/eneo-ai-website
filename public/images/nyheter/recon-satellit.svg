<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Illustration: en satellit i rymden sänder datastrålar ned till ett stiliserat svenskt kommunlandskap med byggnader, skog och ett AI-nätverk.">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1a3a"/>
      <stop offset="55%" stop-color="#0f2b5c"/>
      <stop offset="100%" stop-color="#1a7ad4"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a7ad4" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#005293" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#1a7ad4"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Sky -->
  <rect width="1200" height="630" fill="url(#sky)"/>

  <!-- Stars -->
  <g fill="#ffffff" opacity="0.85">
    <circle cx="90" cy="70" r="1.6"/>
    <circle cx="180" cy="130" r="1"/>
    <circle cx="260" cy="60" r="1.8"/>
    <circle cx="340" cy="180" r="1.2"/>
    <circle cx="460" cy="90" r="1"/>
    <circle cx="560" cy="50" r="1.6"/>
    <circle cx="680" cy="140" r="1.2"/>
    <circle cx="790" cy="60" r="1.8"/>
    <circle cx="880" cy="170" r="1"/>
    <circle cx="980" cy="90" r="1.4"/>
    <circle cx="1080" cy="40" r="1.6"/>
    <circle cx="1140" cy="150" r="1.2"/>
    <circle cx="120" cy="230" r="1"/>
    <circle cx="1020" cy="230" r="1.2"/>
  </g>

  <!-- Earth curve glow -->
  <ellipse cx="600" cy="620" rx="720" ry="120" fill="url(#glow)" opacity="0.35"/>

  <!-- Satellite -->
  <g transform="translate(600 200)">
    <!-- Left solar panel -->
    <g transform="translate(-160 0)">
      <rect x="0" y="-30" width="120" height="60" fill="url(#panel)" stroke="#0b1a3a" stroke-width="2"/>
      <line x1="30" y1="-30" x2="30" y2="30" stroke="#0b1a3a" stroke-width="1.5"/>
      <line x1="60" y1="-30" x2="60" y2="30" stroke="#0b1a3a" stroke-width="1.5"/>
      <line x1="90" y1="-30" x2="90" y2="30" stroke="#0b1a3a" stroke-width="1.5"/>
      <line x1="0" y1="0" x2="120" y2="0" stroke="#0b1a3a" stroke-width="1.5"/>
    </g>
    <!-- Right solar panel -->
    <g transform="translate(40 0)">
      <rect x="0" y="-30" width="120" height="60" fill="url(#panel)" stroke="#0b1a3a" stroke-width="2"/>
      <line x1="30" y1="-30" x2="30" y2="30" stroke="#0b1a3a" stroke-width="1.5"/>
      <line x1="60" y1="-30" x2="60" y2="30" stroke="#0b1a3a" stroke-width="1.5"/>
      <line x1="90" y1="-30" x2="90" y2="30" stroke="#0b1a3a" stroke-width="1.5"/>
      <line x1="0" y1="0" x2="120" y2="0" stroke="#0b1a3a" stroke-width="1.5"/>
    </g>
    <!-- Panel arms -->
    <rect x="-40" y="-3" width="80" height="6" fill="#cbd5e1"/>

    <!-- Body -->
    <rect x="-38" y="-42" width="76" height="84" rx="6" fill="#e2e8f0" stroke="#0b1a3a" stroke-width="2"/>
    <rect x="-30" y="-32" width="60" height="18" fill="#1a7ad4" opacity="0.8"/>
    <rect x="-30" y="-8" width="60" height="8" fill="#0b1a3a" opacity="0.25"/>
    <rect x="-30" y="6" width="60" height="8" fill="#0b1a3a" opacity="0.25"/>
    <rect x="-30" y="20" width="60" height="8" fill="#0b1a3a" opacity="0.25"/>

    <!-- Antenna dish -->
    <g transform="translate(0 52)">
      <path d="M -24 0 Q 0 34 24 0 Z" fill="#cbd5e1" stroke="#0b1a3a" stroke-width="2"/>
      <line x1="0" y1="0" x2="0" y2="28" stroke="#0b1a3a" stroke-width="2"/>
      <circle cx="0" cy="28" r="4" fill="#38bdf8"/>
    </g>

    <!-- Top antenna -->
    <line x1="-14" y1="-42" x2="-18" y2="-66" stroke="#0b1a3a" stroke-width="2"/>
    <line x1="14" y1="-42" x2="18" y2="-66" stroke="#0b1a3a" stroke-width="2"/>
    <circle cx="-18" cy="-66" r="3" fill="#38bdf8"/>
    <circle cx="18" cy="-66" r="3" fill="#38bdf8"/>
  </g>

  <!-- Data beams from satellite -->
  <g stroke="#38bdf8" stroke-width="2" fill="none" opacity="0.85" stroke-linecap="round">
    <path d="M 600 290 L 240 520" stroke-dasharray="4 8"/>
    <path d="M 600 290 L 460 540" stroke-dasharray="4 8"/>
    <path d="M 600 290 L 600 520" stroke-dasharray="4 8"/>
    <path d="M 600 290 L 760 540" stroke-dasharray="4 8"/>
    <path d="M 600 290 L 960 520" stroke-dasharray="4 8"/>
  </g>

  <!-- Landscape / ground -->
  <path d="M 0 540 Q 300 490 600 515 T 1200 525 L 1200 630 L 0 630 Z" fill="url(#ground)"/>

  <!-- Horizon line -->
  <path d="M 0 540 Q 300 490 600 515 T 1200 525" fill="none" stroke="#38bdf8" stroke-width="1.5" opacity="0.6"/>

  <!-- Map grid overlay -->
  <g stroke="#38bdf8" stroke-width="1" opacity="0.25" fill="none">
    <path d="M 0 560 Q 300 510 600 535 T 1200 545"/>
    <path d="M 0 585 Q 300 540 600 560 T 1200 570"/>
    <path d="M 150 520 L 150 630"/>
    <path d="M 380 520 L 380 630"/>
    <path d="M 600 530 L 600 630"/>
    <path d="M 820 520 L 820 630"/>
    <path d="M 1050 520 L 1050 630"/>
  </g>

  <!-- Trees (left cluster) -->
  <g fill="#1e3a2b" stroke="#0b1a3a" stroke-width="1.5">
    <path d="M 120 540 L 135 510 L 150 540 Z"/>
    <path d="M 140 548 L 158 512 L 176 548 Z"/>
    <path d="M 90 548 L 105 518 L 120 548 Z"/>
  </g>

  <!-- Buildings / kommun cluster (center) -->
  <g stroke="#0b1a3a" stroke-width="2">
    <rect x="420" y="490" width="36" height="50" fill="#e2e8f0"/>
    <rect x="460" y="470" width="44" height="70" fill="#cbd5e1"/>
    <rect x="508" y="500" width="30" height="40" fill="#e2e8f0"/>
    <!-- Windows -->
    <g fill="#38bdf8">
      <rect x="428" y="500" width="6" height="6"/>
      <rect x="440" y="500" width="6" height="6"/>
      <rect x="428" y="512" width="6" height="6"/>
      <rect x="440" y="512" width="6" height="6"/>
      <rect x="428" y="524" width="6" height="6"/>
      <rect x="440" y="524" width="6" height="6"/>
      <rect x="468" y="480" width="6" height="6"/>
      <rect x="480" y="480" width="6" height="6"/>
      <rect x="492" y="480" width="6" height="6"/>
      <rect x="468" y="494" width="6" height="6"/>
      <rect x="480" y="494" width="6" height="6"/>
      <rect x="492" y="494" width="6" height="6"/>
      <rect x="468" y="508" width="6" height="6"/>
      <rect x="480" y="508" width="6" height="6"/>
      <rect x="492" y="508" width="6" height="6"/>
      <rect x="468" y="522" width="6" height="6"/>
      <rect x="480" y="522" width="6" height="6"/>
      <rect x="492" y="522" width="6" height="6"/>
      <rect x="515" y="510" width="5" height="5"/>
      <rect x="525" y="510" width="5" height="5"/>
      <rect x="515" y="522" width="5" height="5"/>
      <rect x="525" y="522" width="5" height="5"/>
    </g>
  </g>

  <!-- Second town (right) -->
  <g stroke="#0b1a3a" stroke-width="2">
    <rect x="720" y="510" width="30" height="32" fill="#e2e8f0"/>
    <rect x="754" y="495" width="34" height="47" fill="#cbd5e1"/>
    <rect x="792" y="515" width="24" height="28" fill="#e2e8f0"/>
    <g fill="#38bdf8">
      <rect x="726" y="518" width="5" height="5"/>
      <rect x="736" y="518" width="5" height="5"/>
      <rect x="726" y="530" width="5" height="5"/>
      <rect x="736" y="530" width="5" height="5"/>
      <rect x="760" y="502" width="5" height="5"/>
      <rect x="770" y="502" width="5" height="5"/>
      <rect x="780" y="502" width="5" height="5"/>
      <rect x="760" y="514" width="5" height="5"/>
      <rect x="770" y="514" width="5" height="5"/>
      <rect x="780" y="514" width="5" height="5"/>
      <rect x="760" y="526" width="5" height="5"/>
      <rect x="770" y="526" width="5" height="5"/>
      <rect x="780" y="526" width="5" height="5"/>
      <rect x="798" y="522" width="5" height="5"/>
      <rect x="806" y="522" width="5" height="5"/>
    </g>
  </g>

  <!-- Trees right -->
  <g fill="#1e3a2b" stroke="#0b1a3a" stroke-width="1.5">
    <path d="M 870 548 L 885 518 L 900 548 Z"/>
    <path d="M 898 550 L 914 516 L 930 550 Z"/>
    <path d="M 1030 545 L 1044 515 L 1058 545 Z"/>
  </g>

  <!-- AI network nodes and connections -->
  <g>
    <line x1="240" y1="520" x2="460" y2="540" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="3 6" opacity="0.7"/>
    <line x1="460" y1="540" x2="600" y2="520" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="3 6" opacity="0.7"/>
    <line x1="600" y1="520" x2="760" y2="540" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="3 6" opacity="0.7"/>
    <line x1="760" y1="540" x2="960" y2="520" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="3 6" opacity="0.7"/>

    <g fill="#38bdf8" stroke="#0b1a3a" stroke-width="1.5">
      <circle cx="240" cy="520" r="7"/>
      <circle cx="460" cy="540" r="7"/>
      <circle cx="600" cy="520" r="8"/>
      <circle cx="760" cy="540" r="7"/>
      <circle cx="960" cy="520" r="7"/>
    </g>
    <g fill="#e2e8f0">
      <circle cx="240" cy="520" r="2.5"/>
      <circle cx="460" cy="540" r="2.5"/>
      <circle cx="600" cy="520" r="3"/>
      <circle cx="760" cy="540" r="2.5"/>
      <circle cx="960" cy="520" r="2.5"/>
    </g>
  </g>
</svg>
